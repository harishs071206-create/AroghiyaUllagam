<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AroghiyaUllagam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">🌿</div>
        <h1>AroghiyaUllagam</h1>
        <p class="login-subtitle">ஆரோக்கிய உலகம் — Healthy World Store</p>
      </div>
      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username"/>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      <p class="login-hint">Default: admin / admin123</p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
